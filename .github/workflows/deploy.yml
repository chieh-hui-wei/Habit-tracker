name: Deploy to GCP VM

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: string
        run: |
          echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            # Log in to GHCR on the VM
            echo "$GITHUB_TOKEN" | sudo docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Convert repository name to lowercase for pulling
            IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

            # Pull latest docker image
            sudo docker pull ghcr.io/$IMAGE_NAME:latest

            # Ensure habits.json and database files exist as files so Docker doesn't mount them as directories
            touch /home/a0976395798/Habit-tracker/habits.json
            touch /home/a0976395798/Habit-tracker/investments.json
            touch /home/a0976395798/Habit-tracker/items.json
            touch /home/a0976395798/Habit-tracker/milestones.json

            # Stop and remove existing container if it exists
            sudo docker stop habit-tracker || true
            sudo docker rm habit-tracker || true

            # Run new container
            sudo docker run -d \
              --name habit-tracker \
              -p 7860:7860 \
              --restart always \
              --env-file /home/a0976395798/Habit-tracker/.env \
              -e GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-key.json \
              -v /home/a0976395798/Habit-tracker/gcp-key.json:/app/gcp-key.json \
              -v /home/a0976395798/Habit-tracker/habits.json:/app/habits.json \
              -v /home/a0976395798/Habit-tracker/investments.json:/app/investments.json \
              -v /home/a0976395798/Habit-tracker/items.json:/app/items.json \
              -v /home/a0976395798/Habit-tracker/milestones.json:/app/milestones.json \
              ghcr.io/$IMAGE_NAME:latest

